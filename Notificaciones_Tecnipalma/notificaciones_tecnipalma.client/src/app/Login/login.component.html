<div class="contenedor">
  
  <form (submit)="onSubmit()" class="formulario">

    <h1>Iniciar sesión</h1>

    <div>

      <label for="username">Usuario</label>
      <input type="text" id="username" [(ngModel)]="username" name="username" required placeholder="Ingresa tu nombre de usuario">

    </div>

    <div class="form-group">

      <label for="password">Contraseña</label>

      <div class="password-input">
        <input type="password" id="password" [(ngModel)]="password" name="password" required placeholder="Ingresa tu contraseña">
      </div>

    </div>

    <div class="form-actions">

      <button type="submit" class="btn-submit">Iniciar Sesión</button>
      <button type="button" class="btn-cancel" (click)="resetForm()">Cancelar</button>


    </div>

  </form>

</div>
