<div class="contenedor" img src="img/girar-a-la-izquierda.png" alt="Botón Imagen" >

  <form (submit)="onSubmit()" class="formulario">

    <label class="inicio">Iniciar sesión</label>

    <div>

      <label for="username" class="texto">Usuario</label>
      <input type="text" id="username" [(ngModel)]="username" name="username" required placeholder="Ingresar nombre de usuario">

    </div>

    <div class="form-group">

      <label for="password" class="texto">Contraseña</label>

      <div class="password-input">
        <input type="password" id="password" [(ngModel)]="password" name="password" required placeholder="Ingresar contraseña">
      </div>

    </div>
    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>
    <div class="form-actions">

      <button type="submit" class="btn-submit">Iniciar Sesión</button>
      <button type="button" class="btn-cancel" (click)="resetForm()">Cancelar</button>


    </div>

  </form>

  <!-- Pantalla de carga -->
  <div *ngIf="isLoading" class="loading-screen">
    <img src="img/cargando.gif" alt="Loading..." class="loading-gif">
    <p>Cargando, por favor espere...</p>
  </div>


</div>
